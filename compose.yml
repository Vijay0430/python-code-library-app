version: '3.8'

services:

  db:
    container_name: db
    images: suranagavijay63/dockerrepo:dbimage
    ports:
      - "3306:3306"
    networks:
      - appnet

  auth_service:
    container_name: auth_service
    images: suranagavijay63/dockerrepo:authimage
    ports:
      - "5001:5001"
    depends_on:
      - db
    networks:
      - appnet

  book_service:
    container_name: book_service
    images: suranagavijay63/dockerrepo:bookimage
    ports:
      - "5002:5002"
    depends_on:
      - db
    networks:
      - appnet

  borrow_service:
    container_name: borrow_service
    images: suranagavijay63/dockerrepo:borrowimage
    ports:
      - "5003:5003"
    depends_on:
      - db
    networks:
      - appnet

  frontend_service:
    container_name: frontend_service
    images: suranagavijay63/dockerrepo:frontendimage
    ports:
      - "5000:5000"
    depends_on:
      - auth_service
      - book_service
      - borrow_service
    networks:
      - appnet

networks:
  appnet:
