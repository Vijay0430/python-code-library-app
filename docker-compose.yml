---
services:
  db:
    container-name: dbcont
    image: databaseimage
    ports:
      - "3306:3306"

  auth_service:
    container-name: authcont
    image: authimage
    ports:
      - "5001:5001"
    depends_on:
      - db

  book_service:
    container-name: bookcont
    image: bookimage
    ports:
      - "5002:5002"
    depends_on:
      - db

  borrow_service:
    container-name: borrowcont
    image: borrowimage
    ports:
      - "5003:5003"
    depends_on:
      - db

  app_service:
    container-name: appcont
    image: appimage
    ports:
      - "5000:5000"
    depends_on:
      - auth_service
      - book_service
      - borrow_service
